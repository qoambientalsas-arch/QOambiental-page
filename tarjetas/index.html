<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Presentación | QO Ambiental</title>
    <!-- Favicon (Icono de pestaña) -->
    <link rel="icon" type="image/png" href="../imagenes/Logo QO-recortado.png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card-container">

        <!-- Frente de la Tarjeta -->
        <div class="card card-front">
            <!-- Capa de fondo -->
            <div class="bg-overlay"></div>
            <!-- Elementos decorativos (orbs) -->
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>

            <!-- Contenedor frontal principal con efecto cristal -->
            <div class="front-content glass-effect-front">
                <img src="../imagenes/Logo QO.png" alt="QO Ambiental Logo" class="logo-img">
                <div class="tagline">Consultoría y servicios ambientales ESG</div>
            </div>
        </div>

        <!-- Reverso de la Tarjeta -->
        <div class="card card-back">
            <div class="back-wrapper">
                <div class="header-section">
                    <h2 class="name">Luisa Fernanda Ortiz Triana</h2>
                    <p class="role">REPRESENTANTE LEGAL</p>
                </div>

                <div class="contact-section">
                    <div class="contact-item">
                        <i class="fas fa-envelope"></i>
                        <span>qoambientalsas@gmail.com</span>
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-envelope-open-text"></i>
                        <span>luisaferor@gmail.com</span>
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-phone"></i>
                        <span>+57 311 538 9614</span>
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>Cra 1F #4-74, Villanueva, Casanare</span>
                    </div>
                    <div class="contact-item">
                        <i class="fas fa-globe"></i>
                        <span>www.qoambiental.com</span>
                    </div>
                </div>

                <div class="bottom-section">
                    <div class="qr-placeholder"></div>
                    <img src="../imagenes/Logo QO.png" alt="QO Ambiental Logo" class="logo-img-small">
                </div>
            </div>
        </div>

    </div>
</body>

</html>
