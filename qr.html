<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR | QO Ambiental</title>
    <link rel="icon" href="imagenes/Logo QO-recortado.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a1a20 0%, #0f2a1a 50%, #0a1a20 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 30px;
        }

        /* ══ TARJETA ══
           Formato tipo flyer vertical, ideal para WhatsApp Status e impresión
        */
        .qr-card {
            width: 380px;
            background: linear-gradient(160deg, #0D2630 0%, #1A3A26 55%, #0D2630 100%);
            border-radius: 28px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(0,168,181,.15),
                0 24px 80px rgba(0,0,0,.5),
                0 0 60px rgba(0,168,181,.08);
            position: relative;
        }

        /* Orbes de fondo */
        .orb { position:absolute; border-radius:50%; pointer-events:none; }
        .o1 { width:350px;height:350px;background:radial-gradient(circle,rgba(0,168,181,.12),transparent 70%);top:-120px;right:-100px; }
        .o2 { width:250px;height:250px;background:radial-gradient(circle,rgba(76,175,80,.1),transparent 70%);bottom:-80px;left:-80px; }

        /* Franja top */
        .stripe-top {
            height: 5px;
            background: linear-gradient(90deg, #4CAF50, #8BC34A 50%, #00A8B5);
        }

        /* ── SECCIÓN LOGO ── */
        .card-logo-sec {
            padding: 32px 36px 20px;
            display: flex;
            align-items: center;
            gap: 0;
        }
        .card-logo-img {
            height: 56px;
            filter: brightness(0) invert(1);
        }

        /* ── DIVIDER ── */
        .div {
            height: 1px;
            background: rgba(255,255,255,.08);
            margin: 0 36px;
        }

        /* ── SECCIÓN QR CENTRAL ── */
        .card-qr-sec {
            padding: 28px 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .qr-wrap {
            background: #ffffff;
            border-radius: 20px;
            padding: 14px;
            box-shadow:
                0 0 0 1px rgba(0,168,181,.3),
                0 8px 32px rgba(0,168,181,.2);
        }
        .qr-wrap img {
            width: 180px;
            height: 180px;
            display: block;
            border-radius: 8px;
        }
        .qr-label {
            text-align: center;
        }
        .qr-label h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .qr-label h2 span {
            background: linear-gradient(135deg,#8BC34A,#4CAF50);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .qr-label p {
            color: rgba(255,255,255,.55);
            font-size: .82rem;
            line-height: 1.55;
            max-width: 260px;
            margin: 0 auto;
        }

        /* ── SECCIÓN CONTACTO ── */
        .card-contact-sec {
            padding: 0 36px 28px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .c-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.07);
            border-radius: 10px;
            padding: 9px 14px;
            font-size: .82rem;
            color: rgba(255,255,255,.8);
        }
        .c-row i {
            width: 16px;
            color: #8BC34A;
            font-size: .85rem;
            flex-shrink: 0;
            text-align: center;
        }

        /* ── FOOTER ── */
        .card-footer {
            background: rgba(0,0,0,.3);
            padding: 12px 36px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cf-nit {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: .65rem;
            font-weight: 600;
            color: rgba(255,255,255,.3);
        }
        .cf-tag {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: .65rem;
            font-weight: 700;
            color: #8BC34A;
            letter-spacing: .5px;
        }

        /* ── PRINT ── */
        @media print {
            * { -webkit-print-color-adjust:exact!important; print-color-adjust:exact!important; }
            body { background:white; padding:0; align-items:flex-start; }
            .qr-card { box-shadow:none; border:1px solid #ddd; }
            @page { size:10cm 15cm; margin:5mm; }
        }
    </style>
</head>
<body>

    <div class="qr-card">
        <div class="orb o1"></div>
        <div class="orb o2"></div>

        <!-- Stripe -->
        <div class="stripe-top"></div>

        <!-- Logo -->
        <div class="card-logo-sec">
            <img src="imagenes/Logo QO.png" alt="QO Ambiental" class="card-logo-img">
        </div>

        <div class="div"></div>

        <!-- QR Central -->
        <div class="card-qr-sec">
            <div class="qr-wrap">
                <img
                    src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://qoambiental.com/&color=00A8B5&bgcolor=FFFFFF&qzone=2&format=png"
                    alt="QR QO Ambiental — qoambiental.com"
                >
            </div>
            <div class="qr-label">
                <h2>Escaneá y<br><span>contáctanos</span></h2>
                <p>Apunta tu cámara al código QR para escribirnos directamente.</p>
            </div>
        </div>

        <!-- Contacto -->
        <div class="card-contact-sec">
            <div class="c-row"><i class="fas fa-globe"></i> qoambiental.com</div>
            <div class="c-row"><i class="fas fa-envelope"></i> qoambientalsas@gmail.com</div>
            <div class="c-row"><i class="fas fa-phone"></i> +57 311 538 9614</div>
            <div class="c-row"><i class="fas fa-map-marker-alt"></i> Villanueva, Casanare — Colombia</div>
        </div>

        <!-- Footer -->
        <div class="card-footer">
            <span class="cf-nit">NIT: 901856042-1</span>
            <span class="cf-tag">🌿 Ambiental · Social · Sostenible</span>
        </div>
    </div>

</body>
</html>
